<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | RSP Event</title>

  <link rel="stylesheet" href="css/register.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body class="register-page">

  <div class="register-card">

    <img src="assets/logo.png" class="brand-logo" alt="STSP Logo">

    <h1>สร้างบัญชีผู้ใช้งานใหม่</h1>
    <p class="subtitle">RSP Event Management System</p>

    <form id="register-form" class="register-form horizontal">

      <div class="row two">
        <input id="fname" type="text" placeholder="ชื่อ" required>
        <input id="lname" type="text" placeholder="นามสกุล" required>
      </div>

      <div class="row three">
        <input type="number" placeholder="วัน" min="1" max="31">
        <select>
          <option>เดือน</option>
          <option>มกราคม</option>
          <option>กุมภาพันธ์</option>
          <option>มีนาคม</option>
          <option>เมษายน</option>
          <option>พฤษภาคม</option>
          <option>มิถุนายน</option>
          <option>กรกฎาคม</option>
          <option>สิงหาคม</option>
          <option>กันยายน</option>
          <option>ตุลาคม</option>
          <option>พฤศจิกายน</option>
          <option>ธันวาคม</option>
        </select>
        <select>
          <option>ปี</option>
          <option>2000</option>
          <option>2001</option>
          <option>2002</option>
          <option>2003</option>
        </select>
      </div>

      <div class="row two">
        <input type="text" placeholder="ตำแหน่ง">
        <input type="text" placeholder="หน่วยงาน">
      </div>

      <div class="row two">
        <input id="username" type="text" placeholder="ชื่อผู้ใช้" required>
        <input id="password" type="password" placeholder="กำหนดรหัสผ่าน" required>
      </div>

      <input id="confirm-password" type="password" placeholder="ยืนยันรหัสผ่าน" required>

      <button type="submit">สร้างบัญชี</button>
    </form>

    <div class="register-footer">
      <a href="login.html">← กลับไปหน้าเข้าสู่ระบบ</a>
    </div>

  </div>

  <!-- ✅ สำคัญมาก -->
  <script src="js/register.js"></script>
</body>
</html>
